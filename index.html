<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Analyse Posturale - CAP AEPE</title>
  
  <!-- CSS : Interface Responsive et Épurée -->
  <style>
    :root { --prap-green: #2ecc71; --prap-red: #e74c3c; --prap-blue: #3498db; }
    body { font-family: -apple-system, system-ui, sans-serif; margin: 0; background: #121212; color: white; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
    .header { padding: 20px; text-align: center; background: #2c3e50; width: 100%; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
    .container { position: relative; width: 100%; max-width: 640px; margin-top: 10px; flex-grow: 1; display: flex; justify-content: center; }
    html, body { min-height: 100%; }
    body { font-family: -apple-system, system-ui, sans-serif; margin: 0; background: #121212; color: white; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
    .header { padding: 16px 14px; text-align: center; background: #2c3e50; width: 100%; box-shadow: 0 4px 10px rgba(0,0,0,0.3); font-size: 1rem; }
    .container { position: relative; width: 100%; max-width: 640px; margin-top: 8px; flex-grow: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; }
    video { width: 100%; height: auto; border-radius: 15px; margin-bottom: 10px; background: black; object-fit: cover; }
    canvas { width: 100%; height: auto; border-radius: 15px; }
    .controls { padding: 16px 14px 24px; width: 100%; display: flex; flex-direction: column; align-items: center; background: #1a1a1a; gap: 12px; }
    button { background: var(--prap-blue); color: white; border: none; padding: 16px 22px; border-radius: 999px; font-size: 1rem; font-weight: bold; cursor: pointer; transition: 0.2s; width: 100%; max-width: 360px; -webkit-tap-highlight-color: transparent; }
    button:disabled { background: #555; cursor: wait; }
    @media (max-width: 480px) {
      .header { padding: 14px 12px; font-size: 0.95rem; }
      button { padding: 14px 18px; font-size: 0.98rem; }
      .status { font-size: 0.95rem; width: 100%; }
    }
    .status { margin-top: 15px; padding: 15px; border-radius: 12px; font-weight: bold; text-align: center; width: 90%; font-size: 1rem; }
    .status.ready { background: rgba(52, 152, 219, 0.2); border: 2px solid var(--prap-blue); }
    .status.alert { background: rgba(231, 76, 60, 0.2); border: 2px solid var(--prap-red); }
    .status.valid { background: rgba(46, 204, 113, 0.2); border: 2px solid var(--prap-green); }
  </style>
</head>
<body>

  <div class="header">
    <strong>ALM & PRAP Petite Enfance</strong><br>Analyse des Gestes Professionnels
  </div>
  
  <div class="container">
    <video id="webcam" playsinline muted autoplay></video>
    <canvas id="output_canvas"></canvas>
  </div>

  <div class="controls">
    <button id="startCamera" disabled>ACTIVER LA CAMÉRA</button>
    <button id="takePhoto" disabled>PRENDRE LA PHOTO</button>
    <button id="resetPhoto" disabled>RECOMMENCER</button>
    <div id="status" class="status">Chargement de l'IA...</div>
  </div>

<!-- Chargement des bibliothèques via module ES6 -->
<script type="module">
  import { PoseLandmarker, FilesetResolver, DrawingUtils } from "https://cdn.skypack.dev/@mediapipe/tasks-vision@0.10.0";

  const video = document.getElementById("webcam");
  const canvasElement = document.getElementById("output_canvas");
  const canvasCtx = canvasElement.getContext("2d");
  const statusDiv = document.getElementById("status");
  const startCameraButton = document.getElementById("startCamera");
  const takePhotoButton = document.getElementById("takePhoto");
  const resetPhotoButton = document.getElementById("resetPhoto");

  let poseLandmarker;
  let stream = null;
  const drawingUtils = new DrawingUtils(canvasCtx);

  const initializePoseLandmarker = async () => {
    try {
      const vision = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0/wasm");
      poseLandmarker = await PoseLandmarker.createFromOptions(vision, {
        baseOptions: {
          modelAssetPath: `https://storage.googleapis.com/mediapipe-models/pose_landmarker/pose_landmarker_heavy/float16/1/pose_landmarker_heavy.task`,
          delegate: "GPU"
        },
        runningMode: "IMAGE",
        numPoses: 2,
        minPoseDetectionConfidence: 0.6,
        minPosePresenceConfidence: 0.5
      });
      statusDiv.innerText = "✅ IA prête. Activez la caméra.";
      statusDiv.className = "status ready";
      startCameraButton.disabled = false;
    } catch (error) {
      statusDiv.innerText = "❌ Erreur de chargement (Vérifiez votre connexion)";
      statusDiv.className = "status alert";
      console.error(error);
    }
  };
  initializePoseLandmarker();

  const startCamera = async () => {
    if (!poseLandmarker) return;

    try {
      stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment", width: 640, height: 480 } });
      video.srcObject = stream;
      await video.play();

      canvasElement.width = video.videoWidth;
      canvasElement.height = video.videoHeight;
      video.style.display = "block";
      resetPhotoButton.disabled = true;
      statusDiv.innerText = "✅ Caméra prête. Cliquez sur PRENDRE LA PHOTO.";
      statusDiv.className = "status ready";
      takePhotoButton.disabled = false;
      startCameraButton.disabled = true;
    } catch (err) {
      statusDiv.innerText = "❌ Caméra bloquée. Activez-la dans les réglages.";
      statusDiv.className = "status alert";
      console.error(err);
    }
  };

  const delay = (ms) => new Promise((resolve) => setTimeout(resolve, ms));

  const takePhoto = async () => {
    if (!poseLandmarker || !stream) return;

    takePhotoButton.disabled = true;
    statusDiv.className = "status ready";


    try {
      const bitmap = await createImageBitmap(canvasElement);
      const results = poseLandmarker.detect(bitmap);

      if (results?.landmarks?.length > 0) {
        drawingUtils.drawConnectors(results.landmarks, PoseLandmarker.POSE_CONNECTIONS, { color: '#00FF00', lineWidth: 4 });
        drawingUtils.drawLandmarks(results.landmarks, { radius: 3, color: '#FF0000' });

        const [shoulder, hip, knee] = [results.landmarks[3], results.landmarks[4], results.landmarks[5]];
        const spineLean = Math.abs(shoulder.x - hip.x);
        const legFlexion = Math.abs(hip.y - knee.y);

        if (spineLean > 0.18) {
          statusDiv.innerText = "⚠️ Dos courbé ! Rapprochez l'enfant du corps (PSPEE 1)";
          statusDiv.className = "status alert";
        } else if (legFlexion < 0.1) {
          statusDiv.innerText = "❌ Pliez les jambes ! Utilisez vos cuisses (PSPEE 4)";
          statusDiv.className = "status alert";
        } else {
          statusDiv.innerText = "✅ Position ALM sécurisée (Dos droit et jambes fléchies)";
          statusDiv.className = "status valid";
        }
        resetPhotoButton.disabled = false;
      } else {
        statusDiv.innerText = "⚠️ Aucune pose détectée. Recommencez la prise de photo.";
        statusDiv.className = "status alert";
        resetPhotoButton.disabled = false;
      }
    } catch (error) {
      statusDiv.innerText = `❌ Erreur d'analyse : ${error.message}`;
      statusDiv.className = "status alert";
      console.error(error);
    } finally {
      takePhotoButton.disabled = false;
    }
  };

  const resetPhoto = () => {
    if (stream) {
      const tracks = stream.getTracks();
      tracks.forEach((track) => track.stop());
      stream = null;
    }
    video.srcObject = null;
    canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
    startCameraButton.disabled = false;
    takePhotoButton.disabled = true;
    resetPhotoButton.disabled = true;
    statusDiv.innerText = "✅ Caméra réinitialisée. Activez-la pour reprendre une photo.";
    statusDiv.className = "status ready";
  };

  startCameraButton.addEventListener("click", startCamera);
  takePhotoButton.addEventListener("click", takePhoto);
  resetPhotoButton.addEventListener("click", resetPhoto);
</script>
</body>
</html>
